<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3X LEADER RAKIB</title>
    <style>
        :root { --neon-border: #ff00ff; --bg: rgba(13, 13, 13, 0.95); --gold: #ffea00; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* গেম এরিয়া */
        #main-frame { width: 100%; height: 100%; border: none; }

        /* ড্রাগ-এবল ফ্লোটিং বডি */
        #floating-bot {
            position: absolute; top: 100px; left: 10px; width: 220px;
            background: var(--bg); border: 2px solid var(--neon-border);
            border-radius: 15px; box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
            z-index: 9999; touch-action: none;
        }

        .handle { padding: 10px; text-align: center; font-size: 13px; font-weight: bold; background: var(--neon-border); color: #fff; border-radius: 12px 12px 0 0; cursor: move; }
        .content { padding: 12px; text-align: center; color: #fff; }

        .input-box { width: 90%; padding: 10px; margin: 8px 0; background: #222; border: 1px solid var(--neon-border); color: #fff; border-radius: 8px; text-align: center; }
        .btn { background: var(--neon-border); color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }

        #signal-view { display: none; }
        .pred-text { font-size: 32px; font-weight: 900; color: #00ff41; margin: 10px 0; text-shadow: 0 0 10px #00ff41; }
        
        .tg-btn { display: block; background: #0088cc; color: #fff !important; text-decoration: none; font-size: 12px; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
        .link-txt { font-size: 11px; color: var(--gold); margin-top: 10px; display: block; text-decoration: none; }
        .home-btn { font-size: 10px; color: #aaa; cursor: pointer; text-decoration: underline; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <iframe id="main-frame" src="https://18bdwin24.com/register?inviteCode=G3KCFGN&from=web"></iframe>

    <div id="floating-bot">
        <div class="handle" id="handle">3X LEADER RAKIB (Ai)</div>
        <div class="content">
            
            <div id="lock-screen">
                <input type="text" id="passInput" class="input-box" placeholder="পাসওয়ার্ড দিন">
                <button class="btn" onclick="unlock()">OPEN HACK</button>
                <a href="https://t.me/RAKIB_KILLAR_420" target="_blank" class="link-txt">পাসওয়ার্ড নিতে মেসেজ করুন</a>
                <a href="https://t.me/+zFId_M2uLK8yNzk1" target="_blank" class="tg-btn">টেলিগ্রাম চ্যানেল জয়েন ✅</a>
            </div>

            <div id="signal-view">
                <div id="mode-select">
                    <button class="btn" onclick="start('30S')">Win Go 30s 💥</button>
                    <button class="btn" onclick="start('1M')">Win Go 1m 💣</button>
                </div>
                <div id="live-signal" style="display:none;">
                    <div style="font-size: 11px;">PERIOD: <span id="pID" style="color:var(--gold)">--</span></div>
                    <div id="pRes" class="pred-text">WAIT</div>
                    <div id="pColor" style="font-size: 12px;">COLOR: --</div>
                    <div id="pStatus" style="font-size: 12px; margin-top:5px;">STATUS: --</div>
                    <div class="home-btn" onclick="location.reload()">↺ BACK TO MODES</div>
                </div>
                <div class="home-btn" onclick="document.getElementById('main-frame').src='https://18bdwin24.com'">GO TO HOME</div>
            </div>
        </div>
    </div>

<script>
    // মেয়াদ চেক (২ মে সকাল ১১টা)
    const expireAt = new Date("2026-05-02T11:00:00").getTime();
    if (new Date().getTime() > expireAt) {
        document.body.innerHTML = "<div style='color:red; background:#000; height:100vh; display:flex; justify-content:center; align-items:center; text-align:center;'><h1>ACCESS EXPIRED!<br>Contact Admin</h1></div>";
        window.stop();
    }

    const PASS = "#3X_RAKIB2.0";
    let activeApi = ""; let lastP = "", curBS = "";

    // ড্রাগিং সিস্টেম ঠিক করা হয়েছে
    const bot = document.getElementById("floating-bot");
    const handle = document.getElementById("handle");
    let offsetX, offsetY;

    handle.addEventListener('mousedown', (e) => {
        offsetX = e.clientX - bot.offsetLeft;
        offsetY = e.clientY - bot.offsetTop;
        document.onmousemove = (e) => {
            bot.style.left = (e.clientX - offsetX) + "px";
            bot.style.top = (e.clientY - offsetY) + "px";
        };
    });

    handle.addEventListener('touchstart', (e) => {
        offsetX = e.touches[0].clientX - bot.offsetLeft;
        offsetY = e.touches[0].clientY - bot.offsetTop;
        document.ontouchmove = (e) => {
            bot.style.left = (e.touches[0].clientX - offsetX) + "px";
            bot.style.top = (e.touches[0].clientY - offsetY) + "px";
        };
    });

    document.onmouseup = document.ontouchend = () => { document.onmousemove = null; document.ontouchmove = null; };

    // আনলক ফাংশন ফিক্সড
    function unlock() {
        const input = document.getElementById('passInput').value;
        if(input === PASS) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('signal-view').style.display = 'block';
        } else {
            alert("ভুল পাসওয়ার্ড! সঠিক পাসওয়ার্ড দিন।");
        }
    }

    function start(mode) {
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('live-signal').style.display = 'block';
        activeApi = (mode === '30S') 
            ? 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?pageSize=30'
            : 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?pageSize=30';
        fetchSignal(); setInterval(fetchSignal, 3000);
    }

    async function fetchSignal() {
        try {
            const r = await fetch(activeApi);
            const d = await r.json();
            const latest = d.data.list[0];

            if(lastP !== latest.issueNumber) {
                const hist = d.data.list.slice(0, 10);
                let bigCount = hist.filter(x => parseInt(x.number) >= 5).length;
                let nextBS = (bigCount >= 5) ? "SMALL" : "BIG";
                let nextC = (nextBS === "BIG") ? "GREEN" : "RED";

                if(lastP) {
                    const realBS = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
                    const win = (curBS === realBS);
                    document.getElementById('pStatus').innerHTML = `STATUS: <span style="color:${win?'#00ff41':'#ff003c'}">${win?'WIN 🐯':'LOSS 🖤'}</span>`;
                }
                lastP = latest.issueNumber; curBS = nextBS;
                document.getElementById('pID').innerText = (BigInt(latest.issueNumber) + 1n).toString();
                document.getElementById('pRes').innerText = curBS;
                document.getElementById('pRes').style.color = (curBS === "BIG") ? "var(--gold)" : "#00ff41";
                document.getElementById('pColor').innerHTML = `COLOR: <span style="color:${nextC==='RED'?'#ff003c':'#00ff41'}">${nextC}</span>`;
            }
        } catch(e) {}
    }
</script>
</body>
</html>
