<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Countdown</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            border: 2px solid #30363d;
            padding: 30px 50px;
            border-radius: 20px;
            background: #161b22;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .loading-text {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        #timer {
            font-size: 70px;
            font-weight: bold;
            color: #ffffff;
            font-family: monospace;
            background: #0d1117;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            border: 1px solid #30363d;
        }

        .sub-text {
            margin-top: 20px;
            font-size: 14px;
            color: #8b949e;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="loading-text">সিস্টেম আপডেট হচ্ছে...</div>
    <div id="timer">--:--:--</div>
    <div class="sub-text" id="status">রক্ষণাবেক্ষণ এর জন্য কিছু সময় বন্ধ আছে
অনুগ্রহ করে অপেক্ষা করুন 
ধন্যবাদ </div>
</div>

<script>
    function startTimer() {
        // আজকের দিনের জন্য রাত ১২:৩৫ (পরের দিনের শুরু) টার্গেট করা হয়েছে
        const targetTime = new Date();
        targetTime.setHours(24, 35, 0, 0); 

        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');

        const updateCountdown = setInterval(() => {
            const now = new Date();
            const remaining = targetTime - now;

            if (remaining <= 0) {
                clearInterval(updateCountdown);
                timerDisplay.innerHTML = "00:00:00";
                timerDisplay.style.color = "#238636";
                statusDisplay.innerHTML = "আপডেট সফলভাবে সম্পন্ন হয়েছে!";
                document.querySelector('.loading-text').innerHTML = "আপডেট ফিনিশড";
                return;
            }

            // ঘণ্টা, মিনিট ও সেকেন্ড ক্যালকুলেশন
            const h = Math.floor((remaining / (1000 * 60 * 60)) % 24);
            const m = Math.floor((remaining / (1000 * 60)) % 60);
            const s = Math.floor((remaining / 1000) % 60);

            // ফরম্যাট ঠিক রাখা (00:00:00)
            timerDisplay.innerHTML = 
                (h < 10 ? "0" + h : h) + ":" + 
                (m < 10 ? "0" + m : m) + ":" + 
                (s < 10 ? "0" + s : s);

        }, 1000);
    }

    startTimer();
</script>

</body>
</html>
