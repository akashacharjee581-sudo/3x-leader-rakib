        input {

        #result-popup {

            top: 35%;

            padding: 20px 60px;

            background: rgba(0,0,0,0.8);
            border: 3px solid gold;

        #history-box {

        .log-list {

        .screen { display: none; }

        /* Expired Screen Styles */

        }
        #expired-screen h2 { color: #ff4444; margin-bottom: 10px; }
    </style>
</head>
<body>
    <iframe id="bg-frame" src="https://18bdwin24.com/register?inviteCode=G3KCFGN&from=web"></iframe>

                <button class="btn" onclick="window.open('https://t.me/+zFId_M2uLK8yNzk1')">UPDATE NOW</button>
            </div>

            <div class="nav-holder">
                <div class="nav-btn" onclick="window.open('https://t.me/+zFId_M2uLK8yNzk1')">📡 TG</div>

        <div id="history-box" class="drag-box">
            <div class="header">🔮 3X HISTORY</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmUULdPLLfasvS3HbjN5mpkoxCU8q2t4U",
            authDomain: "shakil-1102d.firebaseapp.com",
            databaseURL: "https://shakil-1102d-default-rtdb.firebaseio.com",
            projectId: "shakil-1102d",
            storageBucket: "shakil-1102d.firebasestorage.app",
            messagingSenderId: "758362426786",
            appId: "1:758362426786:web:1a5adb3405296189ec36fb"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let isRunning = false;
        let apiUrl = '';
        let currentPrediction = null;
        let lastPeriodId = '';
        
        const signalPatterns = [
            { text: '🚀 BIG [7,9]', color: '#ff44ff' },
            { text: '🌀 SMALL [0,4]', color: '#00ffff' },
            { text: '💥 BIG [5,9]', color: '#8a2be2' },
            { text: '🌪️ SMALL [0,4]', color: '#ffcc00' }
        ];

        // --- EXPIRE LOGIC ---
        function checkExpiry() {
            const expiryDate = new Date('2026-04-30T23:59:00'); // ৩০ এপ্রিল রাত ১১:৫৯
            const now = new Date();
            if (now > expiryDate) {
                isRunning = false;
                document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
                document.getElementById('expired-screen').style.display = 'block';
                return true;
            }
            return false;
        }

        async function verifyPassword() {
            if(checkExpiry()) return;
            const userId = document.getElementById('uid').value;
            const password = document.getElementById('pass').value;

            if (!userId || !password) { alert("Fill both fields"); return; }

            try {
                const snapshot = await database.ref('passwords/' + userId).once('value');
                if (!snapshot.exists()) { alert("❌ User Not Found"); return; }
                const data = snapshot.val();
                if (data.status === "blocked") { alert("🚫 Your ID is Blocked"); return; }

                if (data.password === password) {
                    alert("✅ 3X Login Success✔️");
                    showScreen('server-screen');
                } else {
                    alert("❌ Invalid Password🚨");
                }
            } catch (err) { alert("Firebase Error"); }
        }

        function selectServer(serverType) {
            if(checkExpiry()) return;
            apiUrl = 'https://draw.ar-lottery01.com/WinGo/WinGo_' + serverType + '/GetHistoryIssuePage.json?pageNo=1&pageSize=50';
            showScreen('engine-ui');
            isRunning = true;
            startEngine();
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function minimizePanel(e) { e.stopPropagation(); document.getElementById('c-panel').classList.toggle('minimized'); }

        document.getElementById('c-panel').addEventListener('click', function(e) {
            if (this.classList.contains('minimized')) {
                this.classList.remove('minimized');
            }
        });

        function toggleHistory() {
            let hb = document.getElementById('history-box');
            hb.style.display = hb.style.display === 'block' ? 'none' : 'block';
        }

        function startEngine() {
            setInterval(async () => {
                if (!isRunning || checkExpiry()) return;
                const now = new Date();
                const seconds = now.getSeconds();
                let timeRemaining = apiUrl.includes('1M') ? 60 - seconds : 30 - (seconds % 30);
                document.getElementById('time-txt').innerText = '⏳ ' + timeRemaining + 's';

                try {
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    if (!data.data || !data.data.list) return;
                    
                    const latest = data.data.list[0];
                    const nextId = (BigInt(latest.issueNumber) + 1n).toString();

                    if (lastPeriodId && lastPeriodId !== latest.issueNumber && currentPrediction) {
                        const win = (parseInt(latest.number) >= 5 && currentPrediction.text.includes('BIG')) || 
                                    (parseInt(latest.number) < 5 && currentPrediction.text.includes('SMALL'));
                        
                        document.getElementById('history-list').insertAdjacentHTML('afterbegin',
                            `<div class="log-row"><span>#${latest.issueNumber.slice(-4)}</span>
                            <span style="color:${win ? '#0f0' : '#f44'}">${win ? '✅WIN' : '❌LOSS'}</span></div>`
                        );
                    }

                    if (lastPeriodId !== latest.issueNumber) {
                        lastPeriodId = latest.issueNumber;
                        const signal = signalPatterns[Math.floor(Math.random() * signalPatterns.length)];
                        currentPrediction = signal;
                        document.getElementById('prediction-display').innerText = signal.text;
                        document.getElementById('period-txt').innerText = '🌀 PERIOD: ' + nextId.slice(-4);
                    }
                } catch (e) {}
            }, 1000);
        }

        // Drag Setup
        function setupDrag(el) {
            let startX, startY, dragging = false;
            const start = (e) => {
                if (e.target.tagName === 'BUTTON') return;
                dragging = true;
                const evt = e.type.includes('touch') ? e.touches[0] : e;
                startX = evt.clientX - el.offsetLeft;
                startY = evt.clientY - el.offsetTop;
            };
            const move = (e) => {
                if (!dragging) return;
                const evt = e.type.includes('touch') ? e.touches[0] : e;
                el.style.left = (evt.clientX - startX) + 'px';
                el.style.top = (evt.clientY - startY) + 'px';
            };
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start);
            document.addEventListener('mousemove', move);
            document.addEventListener('touchmove', move);
            document.addEventListener('mouseup', () => dragging = false);
            document.addEventListener('touchend', () => dragging = false);
        }
        
        setupDrag(document.getElementById('c-panel'));
        setupDrag(document.getElementById('history-box'));

        window.onload = () => {
            checkExpiry();
            database.ref('.info/connected').on('value', (snap) => {
                document.getElementById('login-status').innerText = snap.val() ? '🟢 3X Network Live' : '🔴 Connecting...';
            });
        };
    </script>
</body>
